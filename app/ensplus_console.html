<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSPLUS — Constitutional Console</title>
<style>
:root{
  --ink:#0E1417; --ink-2:#131C20; --ink-3:#18242A; --line:#243238;
  --bone:#EDE6D6; --bone-dim:#C9C2B4; --muted:#7C8B8F; --muted-2:#5A6A6E;
  --verd:#3FA694; --verd-dim:#2C7568; --verd-glow:rgba(63,166,148,.14);
  --gold:#C6A15B; --gold-dim:#8f7440;
  --claret:#B4574A; --claret-dim:#7d3a31;
  --ok:#3FA694; --warn:#C6A15B; --crit:#B4574A;
  --serif:Georgia,'Iowan Old Style','Palatino Linotype',serif;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
  --r:4px; --sp:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--bone);font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow:hidden}
::selection{background:var(--verd);color:var(--ink)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--verd-dim)}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select{font-family:inherit;color:inherit}
h1,h2,h3,h4{font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--verd)}
.muted{color:var(--muted)}.dim{color:var(--muted-2)}
.gold{color:var(--gold)}.verd{color:var(--verd)}.claret{color:var(--claret)}

/* ---------- shell ---------- */
#app{display:grid;grid-template-columns:248px 1fr;grid-template-rows:56px 1fr;height:100vh;
  grid-template-areas:"brand top" "nav main"}
#brand{grid-area:brand;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:11px;padding:0 20px;background:var(--ink-2)}
#brand .seal-sm{width:26px;height:26px;flex:none}
#brand b{font-family:var(--serif);font-size:17px;letter-spacing:1.5px}
#brand .tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
#top{grid-area:top;border-bottom:1px solid var(--line);display:flex;align-items:center;
  justify-content:space-between;padding:0 24px;background:linear-gradient(180deg,var(--ink-2),var(--ink))}
#top .pulse{display:flex;gap:26px;align-items:center}
#top .pstat{display:flex;flex-direction:column;line-height:1.15}
#top .pstat .v{font-family:var(--mono);font-size:13px;color:var(--bone)}
#top .pstat .k{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
#nav{grid-area:nav;border-right:1px solid var(--line);background:var(--ink-2);overflow-y:auto;padding:14px 0 40px}
#main{grid-area:main;overflow-y:auto;position:relative}
.navgroup{padding:6px 0}
.navgroup .glabel{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted-2);padding:10px 22px 6px}
.navitem{display:flex;align-items:center;gap:11px;padding:8px 22px;color:var(--bone-dim);
  font-size:13.5px;border-left:2px solid transparent;transition:.14s;position:relative}
.navitem:hover{background:var(--ink-3);color:var(--bone)}
.navitem.active{color:var(--bone);border-left-color:var(--verd);background:linear-gradient(90deg,var(--verd-glow),transparent)}
.navitem .ic{width:15px;height:15px;flex:none;opacity:.85}
.navitem .badge{margin-left:auto;font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:20px;
  background:var(--ink);border:1px solid var(--line);color:var(--muted)}
.navitem.active .badge{border-color:var(--verd-dim);color:var(--verd)}

/* ---------- connect banner ---------- */
#connectbar{display:flex;align-items:center;gap:10px}
.wallet-chip{display:flex;align-items:center;gap:9px;padding:6px 12px;border:1px solid var(--line);
  border-radius:20px;background:var(--ink-2);font-family:var(--mono);font-size:12px}
.wallet-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2)}
.wallet-chip.on .dot{background:var(--verd);box-shadow:0 0 8px var(--verd)}
.btn{border:1px solid var(--verd-dim);background:var(--verd-glow);color:var(--verd);padding:7px 15px;
  border-radius:var(--r);font-size:13px;font-weight:600;letter-spacing:.02em;transition:.14s;white-space:nowrap}
.btn:hover{background:var(--verd);color:var(--ink)}
.btn.ghost{border-color:var(--line);background:transparent;color:var(--bone-dim)}
.btn.ghost:hover{border-color:var(--verd-dim);color:var(--verd);background:var(--verd-glow)}
.btn.danger{border-color:var(--claret-dim);color:var(--claret);background:rgba(180,87,74,.08)}
.btn.danger:hover{background:var(--claret);color:var(--ink)}
.btn.gold{border-color:var(--gold-dim);color:var(--gold);background:rgba(198,161,91,.08)}
.btn.gold:hover{background:var(--gold);color:var(--ink)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.sm{padding:4px 10px;font-size:11.5px}

/* ---------- panels ---------- */
.panel{display:none;padding:28px 34px 60px;max-width:1180px;animation:fade .3s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.phead{margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:16px}
.phead h1{font-size:27px;margin:5px 0 3px}
.phead p{color:var(--muted);font-size:13.5px;max-width:70ch}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}
.g-2-1{grid-template-columns:2fr 1fr}
@media(max-width:1080px){.g2,.g3,.g-2-1{grid-template-columns:1fr}}

.card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.card.raised{background:var(--ink-3)}
.card h3{font-size:16px;margin-bottom:3px;display:flex;align-items:center;gap:9px}
.card .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.card-hd h3{margin:0}

.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:0}
.stat-row .k{color:var(--muted);font-size:12.5px}
.stat-row .v{font-family:var(--mono);font-size:13.5px}
.big{font-family:var(--mono);font-size:30px;letter-spacing:-.5px;line-height:1}
.big .u{font-size:13px;color:var(--muted);margin-left:5px;letter-spacing:0}

.pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid var(--line)}
.pill.verd{color:var(--verd);border-color:var(--verd-dim);background:var(--verd-glow)}
.pill.gold{color:var(--gold);border-color:var(--gold-dim);background:rgba(198,161,91,.09)}
.pill.claret{color:var(--claret);border-color:var(--claret-dim);background:rgba(180,87,74,.09)}
.pill.mut{color:var(--muted)}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

hr.hair{border:0;border-top:1px solid var(--line);margin:16px 0}
.covenant{display:inline-flex;gap:7px;align-items:center;font-family:var(--mono);font-size:10.5px;
  color:var(--verd);border:1px dashed var(--verd-dim);padding:5px 11px;border-radius:20px;letter-spacing:.04em}

/* forms */
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:var(--r);
  padding:9px 11px;font-family:var(--mono);font-size:13px;transition:.14s}
.field input:focus,.field select:focus{outline:none;border-color:var(--verd-dim);box-shadow:0 0 0 3px var(--verd-glow)}
.inline{display:flex;gap:10px;align-items:flex-end}.inline .field{flex:1;margin-bottom:0}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);
  text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:400}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.hoverable:hover td{background:var(--ink-3)}
.tnum{font-family:var(--mono);text-align:right}

/* meter / bar */
.meter{height:7px;background:var(--ink);border-radius:20px;overflow:hidden;border:1px solid var(--line)}
.meter>span{display:block;height:100%;background:linear-gradient(90deg,var(--verd-dim),var(--verd));border-radius:20px;transition:width .5s}
.meter.gold>span{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:9px;z-index:100}
.toast{background:var(--ink-3);border:1px solid var(--verd-dim);border-left:3px solid var(--verd);
  padding:11px 15px;border-radius:var(--r);font-size:12.5px;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:slidein .25s ease}
.toast.gold{border-color:var(--gold-dim);border-left-color:var(--gold)}
.toast.claret{border-color:var(--claret-dim);border-left-color:var(--claret)}
.toast .tt{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* proposal / list rows */
.lrow{border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:11px;background:var(--ink-2);transition:.14s}
.lrow:hover{border-color:var(--verd-dim)}
.lrow-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:9px}
.lrow-hd .ttl{font-family:var(--serif);font-size:15.5px}
.phase-track{display:flex;gap:3px;margin:11px 0 8px}
.phase-seg{flex:1;height:4px;border-radius:20px;background:var(--line)}
.phase-seg.done{background:var(--verd-dim)}.phase-seg.now{background:var(--verd);box-shadow:0 0 7px var(--verd)}
.tally{display:flex;gap:14px;font-family:var(--mono);font-size:12px;margin-top:4px}

/* seal + gauge svg blocks */
.sealwrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px}
.gaugewrap{padding:4px}

/* era swatch */
.era-chip{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:3px;letter-spacing:.05em}
.era-0{background:rgba(198,161,91,.16);color:var(--gold);border:1px solid var(--gold-dim)}
.era-1{background:rgba(63,166,148,.14);color:var(--verd);border:1px solid var(--verd-dim)}
.era-2{background:var(--ink);color:var(--bone-dim);border:1px solid var(--line)}
.era-3{background:var(--ink);color:var(--muted);border:1px solid var(--line)}

.kv{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12.5px}
.kv .k{color:var(--muted);font-family:var(--mono);font-size:11px}
.kv .v{font-family:var(--mono);text-align:right}
.note{font-size:11.5px;color:var(--muted-2);font-style:italic;margin-top:8px;line-height:1.5}
.wt-ladder{display:flex;gap:2px;margin-top:6px}
.wt-step{flex:1;text-align:center;padding:5px 2px;font-family:var(--mono);font-size:9px;letter-spacing:.05em;
  text-transform:uppercase;border:1px solid var(--line);color:var(--muted-2);border-radius:3px}
.wt-step.on{border-color:currentColor}

/* ---------- user guide ---------- */
.qs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:4px 0 8px}
@media(max-width:900px){.qs{grid-template-columns:1fr 1fr}}
.qs-step{background:var(--ink-3);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;position:relative}
.qs-step .num{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--verd);text-transform:uppercase}
.qs-step h4{font-size:14.5px;margin:6px 0 4px}
.qs-step p{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.45}
.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;background:var(--ink-2);overflow:hidden}
.acc-hd{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:.14s}
.acc-hd:hover{background:var(--ink-3)}
.acc-hd .lhs{display:flex;align-items:center;gap:12px}
.acc-hd .ic{width:17px;height:17px;color:var(--verd);flex:none}
.acc-hd h4{font-size:15px}
.acc-hd .sub2{font-size:11.5px;color:var(--muted)}
.acc-hd .chev{color:var(--verd);transition:transform .2s;flex:none}
.acc.open .chev{transform:rotate(90deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .32s ease}
.acc.open .acc-body{max-height:1400px}
.acc-inner{padding:2px 18px 18px}
.acc-inner .why{font-size:13px;color:var(--bone-dim);margin-bottom:8px;line-height:1.55}
ol.steps{counter-reset:s;list-style:none;margin:6px 0 4px}
ol.steps li{counter-increment:s;position:relative;padding:8px 0 8px 36px;border-bottom:1px solid var(--line);font-size:13px}
ol.steps li:last-child{border-bottom:0}
ol.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:23px;height:23px;border-radius:50%;
  border:1px solid var(--verd-dim);color:var(--verd);font-family:var(--mono);font-size:11px;display:flex;align-items:center;justify-content:center}
ol.steps li b{color:var(--bone)}
.gloss{width:100%;border-collapse:collapse}
.gloss td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:12.5px}
.gloss td:first-child{width:180px;font-family:var(--mono);color:var(--verd);font-size:12px}
.guide-cta{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}

/* ---------- status banners / community ---------- */
.banner{display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border-radius:var(--r);margin-bottom:18px;font-size:12.5px;line-height:1.55}
.banner .bt{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.banner.info{background:var(--verd-glow);border:1px solid var(--verd-dim);color:var(--bone-dim)}
.banner.info .bt{color:var(--verd)}
.banner.planned{background:rgba(198,161,91,.08);border:1px solid var(--gold-dim);color:var(--bone-dim)}
.banner.planned .bt{color:var(--gold)}
.banner .bic{flex:none;margin-top:1px}
.preview{opacity:.6;filter:saturate(.6)}
.stamp{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:9px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold);border:1px dashed var(--gold-dim);padding:3px 9px;border-radius:20px}
.glegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;color:var(--muted)}
.glegend span{display:inline-flex;align-items:center;gap:6px}
.dotc{width:9px;height:9px;border-radius:50%;display:inline-block}
.gnode text{font-family:var(--mono);font-size:9.5px}
.badge.soon{color:var(--gold);border-color:var(--gold-dim)}
</style>
</head>
<body>
<div id="app">
  <div id="brand">
    <svg class="seal-sm" viewBox="0 0 100 100"><use href="#sealGlyph"/></svg>
    <div><b>ENSPLUS</b><div class="tag">Constitutional Delegate</div></div>
  </div>
  <div id="top">
    <div class="pulse" id="pulse"></div>
    <div id="connectbar"></div>
  </div>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div id="toast"></div>

<!-- shared SVG defs (seal glyph) -->
<svg width="0" height="0" style="position:absolute"><defs>
  <g id="sealGlyph">
    <circle cx="50" cy="50" r="47" fill="none" stroke="#3FA694" stroke-width="2"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#C6A15B" stroke-width="1" stroke-dasharray="2 3"/>
    <path d="M50 26 L61 44 L50 62 L39 44 Z" fill="none" stroke="#C6A15B" stroke-width="2"/>
    <circle cx="50" cy="50" r="5" fill="#3FA694"/>
    <path d="M32 70 Q50 80 68 70" fill="none" stroke="#3FA694" stroke-width="1.5"/>
  </g>
</defs></svg>

<script>
/* ============================================================================
   ENSPLUS console — demo state model faithful to the on-chain contracts.
   No chain connection (viewer sandbox); interactions mutate local state so the
   full backend scope is demonstrable. Numbers/logic mirror the real libraries.
============================================================================ */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const fmt=(n,d=0)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maxFractionDigits:d,maximumFractionDigits:d});
const short=a=>a.slice(0,6)+'…'+a.slice(-4);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---- LibTrust weights (verbatim from LibTrust.sol) ---- */
const TW={PROV:4000,TEN:2500,PART:3000,CAT:500,HUMAN:2000,SCALE:10000};
const ERA_NAMES=['Prepunk','Auction','Permanent','Modern'];
const ERA_PART=[7000,4666,2333,0];           // eraPart by era (4e18..1e18 mapped)
function rankPart(rank){ if(!rank)return 0; if(rank<=100)return 3000; if(rank<=1000)return 2000; if(rank<=10000)return 1000; return 0; }
function provenanceScore(era,rank,attested){ if(!attested)return 0; return Math.min(TW.SCALE, ERA_PART[era]+rankPart(rank)); }
function tenureScore(days,banked){ const t=Math.min(1,days/730)*6000; return Math.min(TW.SCALE, t + Math.min(banked,10)*400); }
function participationScore(active,since,credits){ const c=since?Math.min(active,since)/since*5000:0; const v=Math.min(active,20)*150; const cr=Math.min(1,credits/1000)*2000; return Math.min(TW.SCALE, c+v+cr); }
function categoryScore(bits){ let n=0;for(let b=bits;b;b>>=1)n+=b&1; return Math.min(TW.SCALE,n*2500); }
function reputation(m){
  const p=provenanceScore(m.era,m.rank,m.attested), te=tenureScore(m.tenureDays,m.banked),
        pa=participationScore(m.epochsActive,m.epochsSince,m.credits), c=categoryScore(m.categoryBits);
  let base=Math.floor((p*TW.PROV+te*TW.TEN+pa*TW.PART+c*TW.CAT)/TW.SCALE);
  if(m.human)base+=TW.HUMAN;
  const rep=Math.min(TW.SCALE,base);
  return {p,te,pa,c,rep,mult:1+rep*0.25/TW.SCALE};
}

/* ---- adoption/threshold model (from adoption_model.mjs) ---- */
const NICK=3_260_000, SUPPLY=100_000_000;
const THRESHOLDS=[
  {name:'Seedling',at:100_000,note:'Top-tier delegate; a credible public voice.'},
  {name:'Quorum-maker',at:1_000_000,note:'Can alone satisfy the ~1% executable quorum.'},
  {name:'Swing bloc',at:NICK-400_000,note:'Pivotal on ordinary, non-crisis proposals.'},
  {name:'Counterweight',at:NICK,note:'Parity with Nick on a contested vote — nothing passes over objection.'},
  {name:'Decisive',at:Math.round(NICK*1.6),note:'Drives outcomes affirmatively; center of gravity.'},
];
function blocTier(w){ let r=THRESHOLDS[0]; for(const t of THRESHOLDS)if(w>=t.at)r=t; return r; }

/* ---- demo state ---- */
const S={
  connected:false,
  addr:'0x1D3a…rocky'.replace('…','5F9c2b7Ae4D8'),
  ens:'rocky.eth',
  protocol:{wrappedTokens:1_420_000, holders:2140, epoch:7, tier:2, blocWrapped:1_420_000},
  me:{
    ensPlus:100, ensUnwrapped:9_900, vestedPct:100,
    era:0, rank:42, attested:true, tenureDays:1120, banked:5,
    epochsActive:18, epochsSince:20, credits:1500, categoryBits:0b101, human:false,
    citizen:true, primaryName:'rocky.eth', linkedLabel:'rocky', citizenRetired:false,
  },
  creditLedger:[
    {epoch:5, action:'Revealed a vote', amt:300},
    {epoch:6, action:'Revealed a vote', amt:300},
    {epoch:7, action:'Created a proposal', amt:400},
    {epoch:7, action:'Revealed a vote', amt:500},
  ],
  social:{
    nodes:[
      {name:'rocky.eth', era:0, me:true},
      {name:'prepunk.eth', era:0},
      {name:'elder.eth', era:0},
      {name:'scribe.eth', era:1},
      {name:'vault.eth', era:2},
      {name:'warden.eth', era:2},
      {name:'ceremony.eth', era:3},

let VIEW='overview';
function renderNav(){
  const n=$('#nav'); n.innerHTML='';
  NAV.forEach(grp=>{
    const g=el('div','navgroup'); g.appendChild(el('div','glabel',grp.g));
    grp.items.forEach(([id,label,ic])=>{
      const it=el('div','navitem'+(id===VIEW?' active':''));
      it.innerHTML=`<span class="ic">${ic()}</span>${label}`;
      const b=badgeFor(id); if(b)it.appendChild(el('span','badge'+(b==='soon'?' soon':''),b));
      it.onclick=()=>{VIEW=id;renderNav();renderMain();$('#main').scrollTop=0;};
      g.appendChild(it);
    });
    n.appendChild(g);
  });
}
function badgeFor(id){
  if(id==='govern')return String(S.proposals.filter(p=>p.phase<3).length);
  if(id==='watchtower'){const c=S.names.filter(n=>n.watched&&n.expiryDays<=30).length;return c?String(c):null;}
  if(id==='names')return String(S.names.filter(n=>n.wrapped).length);
  if(id==='social')return 'opt';
  if(id==='guilds')return 'soon';
  return null;
}

function socialGraph(){

  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%">${edges}${nodes}</svg>`;
  return wrap;
}

function blocGauge(wrapped){
  const wrap=el('div','gaugewrap');
  const W=440,H=210,cx=W/2,cy=180,rad=150;
  const maxV=5_500_000;
  const toAng=v=>Math.PI-clamp(v/maxV,0,1)*Math.PI; // 180deg..0deg
  const pt=(v,r)=>{const a=toAng(v);return[cx+Math.cos(a)*r,cy-Math.sin(a)*r];};
  const arc=(v0,v1,r,col,wd)=>{const [x0,y0]=pt(v0,r),[x1,y1]=pt(v1,r);const large=0;
    return `<path d="M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}" fill="none" stroke="${col}" stroke-width="${wd}" stroke-linecap="round"/>`;};
  // colored bands by threshold
  let bands='';const cols=['#2C7568','#3FA694','#C6A15B','#B4574A','#C6A15B'];
  const pts=[0,...THRESHOLDS.map(t=>t.at),maxV];
  for(let i=0;i<pts.length-1;i++){bands+=arc(pts[i],pts[i+1],rad,i===0?'#243238':cols[(i-1)%cols.length]||'#243238',7);}
  // full track
  bands=arc(0,maxV,rad,'#243238',7)+arc(0,wrapped,rad,'#3FA694',7);
  // nick marker
  const [nx,ny]=pt(NICK,rad+2),[nx2,ny2]=pt(NICK,rad-16);
  // needle
  const [hx,hy]=pt(wrapped,rad-24);
  const tier=blocTier(wrapped);
  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%">
    ${bands}
    <line x1="${nx}" y1="${ny}" x2="${nx2}" y2="${ny2}" stroke="#B4574A" stroke-width="2"/>
    <text x="${nx2}" y="${ny2-5}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" fill="#B4574A">NICK 3.26M</text>
    <line x1="${cx}" y1="${cy}" x2="${hx}" y2="${hy}" stroke="#EDE6D6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="#EDE6D6"/>
    <text x="${cx}" y="${cy-42}" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#3FA694">${(wrapped/1e6).toFixed(2)}M</text>
    <text x="${cx}" y="${cy-26}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" letter-spacing="2" fill="#7C8B8F">ENS WRAPPED</text>
    <text x="${cx}" y="${cy+22}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" letter-spacing="3" fill="#C6A15B">${tier.name.toUpperCase()}</text>
  </svg>`;
  return wrap;
}
function profileCard(){
  const r=reputation(S.me);
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const hue=(parseInt('1d3a5f',16)%360);
  const wrap=el('div');
  wrap.innerHTML=`<svg viewBox="0 0 440 200" width="100%" style="border:1px solid var(--line);border-radius:6px">
    <rect width="440" height="200" fill="#131C20"/>
    <rect x="0" y="0" width="440" height="5" fill="#3FA694"/>
    <clipPath id="av"><rect x="22" y="30" width="90" height="90" rx="18"/></clipPath>
    <rect x="22" y="30" width="90" height="90" rx="18" fill="#0E1417"/>
    <g clip-path="url(#av)"><use href="#sealGlyph" transform="translate(22,30) scale(.9)"/></g>
    <text x="130" y="52" font-family="Georgia,serif" font-size="22" fill="#EDE6D6">${esc(S.ens)}</text>
    <circle cx="${130+esc(S.ens).length*11+12}" cy="45" r="8" fill="#3FA694"/>
    <path d="${'M '+(130+esc(S.ens).length*11+8.5)+' 45 l 2.5 2.5 l 5 -6'}" stroke="#131C20" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="130" y="72" font-family="ui-monospace,monospace" font-size="12" fill="#7C8B8F">${esc(short(S.addr))}</text>
    <text x="130" y="98" font-family="ui-monospace,monospace" font-size="12" fill="#C6A15B">${ERA_NAMES[S.me.era]} · rank #${S.me.rank}</text>
    <g transform="translate(130,150)"><text font-family="ui-monospace,monospace" font-size="17" font-weight="700" fill="#EDE6D6">${r.rep}</text><text y="15" font-family="ui-monospace,monospace" font-size="10" fill="#7C8B8F">reputation</text></g>
    <g transform="translate(240,150)"><text font-family="ui-monospace,monospace" font-size="17" font-weight="700" fill="#3FA694">${r.mult.toFixed(2)}×</text><text y="15" font-family="ui-monospace,monospace" font-size="10" fill="#7C8B8F">multiplier</text></g>
    <g transform="translate(350,150)"><text font-family="ui-monospace,monospace" font-size="17" font-weight="700" fill="${S.me.human?'#3FA694':'#5A6A6E'}">${S.me.human?'✓':'—'}</text><text y="15" font-family="ui-monospace,monospace" font-size="10" fill="#7C8B8F">human</text></g>
    <text x="418" y="190" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#3A484C">resolved on-chain · ENSPLUS</text>
  </svg>`;
  return wrap;
}
